name: template-self-test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: check rule consistency (B-022)
        run: ./scripts/check-rule-consistency.sh
      - name: check doc references (B-023)
        run: ./scripts/check-doc-references.sh
      - name: check placeholders (B-024)
        run: ./scripts/check-placeholders.sh
      - name: check spec consistency (B-029)
        run: ./scripts/check-spec-consistency.sh
      - name: template smoke test (B-014)
        run: ./scripts/smoke-test.sh
